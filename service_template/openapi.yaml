openapi: "3.0.3"
info:
  title: Social Network API
  description: |
    REST API для социальной сети (Вариант 1).

    ## Аутентификация
    После логина передавайте токен в заголовке:
    ```
    Authorization: Bearer <token>
    ```
  version: "1.0.0"

servers:
  - url: http://localhost:8080

tags:
  - name: Auth
    description: Регистрация и аутентификация
  - name: Users
    description: Поиск пользователей
  - name: Wall
    description: Стена пользователя
  - name: Chat
    description: P2P сообщения

paths:

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Создание нового пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              login: "ivan_petrov"
              password: "pass123"
              first_name: "Иван"
              last_name: "Петров"
      responses:
        "201":
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "409":
          description: Логин уже занят

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Вход в систему
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Выход из системы
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Выход выполнен

  /api/v1/users:
    get:
      tags: [Users]
      summary: Поиск пользователей
      description: |
        Передайте один из параметров:
        - `login` — точный поиск по логину
        - `name`  — поиск по маске имени и фамилии
      security:
        - BearerAuth: []
      parameters:
        - name: login
          in: query
          schema:
            type: string
          example: ivan_petrov
        - name: name
          in: query
          schema:
            type: string
          example: Петр
      responses:
        "200":
          description: Результат поиска
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/User'
                  - type: array
                    items:
                      $ref: '#/components/schemas/User'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  /api/v1/wall/{user_id}:
    post:
      tags: [Wall]
      summary: Добавление записи на стену
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WallPostRequest'
            example:
              content: "Привет всем! Это мой первый пост."
              created_at: "2024-03-15T12:00:00"
      responses:
        "201":
          description: Запись добавлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WallPost'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

    get:
      tags: [Wall]
      summary: Загрузка стены пользователя
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        "200":
          description: Список записей на стене
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WallPost'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  /api/v1/messages:
    post:
      tags: [Chat]
      summary: Отправка сообщения пользователю (P2P)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageRequest'
            example:
              receiver_id: 2
              text: "Привет! Как дела?"
              created_at: "2024-03-15T12:05:00"
      responses:
        "201":
          description: Сообщение отправлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessage'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Получатель не найден

    get:
      tags: [Chat]
      summary: Получение списка сообщений для пользователя
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Список сообщений (входящие + исходящие)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatMessage'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  parameters:
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  responses:
    BadRequest:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Неверный или отсутствующий токен
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    RegisterRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
        password:
          type: string
        first_name:
          type: string
        last_name:
          type: string

    RegisterResponse:
      type: object
      properties:
        id:
          type: integer
        login:
          type: string

    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user_id:
          type: integer

    User:
      type: object
      properties:
        id:
          type: integer
        login:
          type: string
        first_name:
          type: string
        last_name:
          type: string

    WallPostRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
        created_at:
          type: string
          format: date-time

    WallPost:
      allOf:
        - type: object
          properties:
            id:
              type: integer
            author_id:
              type: integer
            owner_id:
              type: integer
        - $ref: '#/components/schemas/WallPostRequest'

    MessageRequest:
      type: object
      required: [receiver_id, text]
      properties:
        receiver_id:
          type: integer
        text:
          type: string
        created_at:
          type: string
          format: date-time

    ChatMessage:
      allOf:
        - type: object
          properties:
            id:
              type: integer
            sender_id:
              type: integer
        - $ref: '#/components/schemas/MessageRequest'
